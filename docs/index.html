<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIDtaiko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="img/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a22;
      border: 1px solid #2e2e3a;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    .sub {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }
    p {
      font-size: 1rem;
      line-height: 1.8;
      color: #ccc;
      margin-bottom: 32px;
    }
    a.btn {
      display: inline-block;
      background: #4f8ef7;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.btn:hover { background: #3a78e0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HIDtaiko</h1>
    <p class="sub">V1.1 / V1.2 設定ツール</p>
    <p>このサイトは移行しました。<br>以降はこちらのサイトをご利用ください。</p>
    <a class="btn" href="https://kasasiki3.github.io/HIDtaiko/index.html">新しいサイトへ移動する</a>
  </div>
</body>
</html>
